name: Set up metall build environment
description: Installs Go, Node.js, just (verified sha256), and the cached LLVM toolchain.

runs:
  using: composite
  steps:
    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version-file: metallc/go.mod
        # A self-hosted runner keeps the Go caches on local disk between runs,
        # so only cache to GitHub on ephemeral hosted runners.
        cache: ${{ runner.environment == 'github-hosted' }}
        cache-dependency-path: |
          metallc/go.sum
          tools/go.sum

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: "25"

    - name: Cache just
      id: cache-just
      if: runner.environment == 'github-hosted'
      uses: actions/cache@v5
      with:
        path: ~/.local/bin/just
        key: just-1.49.0-${{ runner.os }}-${{ runner.arch }}

    - name: Download just
      if: steps.cache-just.outputs.cache-hit != 'true'
      shell: bash
      env:
        JUST_VERSION: "1.49.0"
      run: |
        set -euo pipefail
        # The cache is skipped on self-hosted runners, where `just` persists in
        # $HOME, so reuse the local copy instead of re-downloading.
        if [ -x "$HOME/.local/bin/just" ]; then
          echo "just already installed"
          exit 0
        fi
        case "$(uname)-$(uname -m)" in
          Linux-x86_64)
            just_target="x86_64-unknown-linux-musl"
            just_sha="05eb2f068b641b06e5b318796c2e27d4dcca608e65b34329a08c1b9f582611bd"
            ;;
          Darwin-arm64)
            just_target="aarch64-apple-darwin"
            just_sha="d21b20df01ec9b9762b0ef08e56ae8dccf3738770edeafa8d2b3a750aee06d78"
            ;;
          *)
            echo "unsupported platform: $(uname)-$(uname -m)" >&2
            exit 1
            ;;
        esac
        url="https://github.com/casey/just/releases/download/${JUST_VERSION}/just-${JUST_VERSION}-${just_target}.tar.gz"
        curl -fL --retry 5 --retry-delay 5 --retry-all-errors "$url" -o just.tar.gz
        echo "${just_sha}  just.tar.gz" | shasum -a 256 -c -
        mkdir -p "$HOME/.local/bin"
        tar -xzf just.tar.gz -C "$HOME/.local/bin" just
        rm just.tar.gz

    - name: Add just to PATH
      shell: bash
      run: |
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        "$HOME/.local/bin/just" --version

    - name: Install cmake + ninja (for a cold LLVM build)
      if: runner.environment == 'github-hosted' && runner.os == 'Linux'
      shell: bash
      run: sudo apt-get update && sudo apt-get install -y cmake ninja-build

    # Key the LLVM cache on build-info (os/arch/config) plus the runner image,
    # which is the toolchain build-info can't see. ImageOS/ImageVersion are set on
    # hosted runners, empty on self-hosted (which doesn't cache anyway).
    - name: LLVM cache key
      id: llvm-key
      if: runner.environment == 'github-hosted'
      shell: bash
      env:
        METALL_LLVM_BUILD_TAG: ${{ env.ImageOS }}-${{ env.ImageVersion }}
      run: echo "key=llvm-static-$(just llvm build-info | shasum -a 256 | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

    - name: Cache static LLVM
      if: runner.environment == 'github-hosted'
      uses: actions/cache@v5
      with:
        path: .build/llvm-static
        key: ${{ steps.llvm-key.outputs.key }}

    - name: Build static LLVM + cgo flags
      shell: bash
      env:
        METALL_LLVM_BUILD_TAG: ${{ env.ImageOS }}-${{ env.ImageVersion }}
      run: just llvm build
