name: Set up metall build environment
description: Installs Go, Node.js, just (verified sha256), and the cached LLVM toolchain.

runs:
  using: composite
  steps:
    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version-file: metallc/go.mod

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: "25"

    - name: Cache just
      id: cache-just
      uses: actions/cache@v5
      with:
        path: ~/.local/bin/just
        key: just-1.49.0-${{ runner.os }}-${{ runner.arch }}

    - name: Download just
      if: steps.cache-just.outputs.cache-hit != 'true'
      shell: bash
      env:
        JUST_VERSION: "1.49.0"
        JUST_SHA256: "05eb2f068b641b06e5b318796c2e27d4dcca608e65b34329a08c1b9f582611bd"
      run: |
        set -euo pipefail
        url="https://github.com/casey/just/releases/download/${JUST_VERSION}/just-${JUST_VERSION}-x86_64-unknown-linux-musl.tar.gz"
        curl -fL --retry 5 --retry-delay 5 --retry-all-errors "$url" -o just.tar.gz
        echo "${JUST_SHA256}  just.tar.gz" | sha256sum -c -
        mkdir -p "$HOME/.local/bin"
        tar -xzf just.tar.gz -C "$HOME/.local/bin" just
        rm just.tar.gz

    - name: Add just to PATH
      shell: bash
      run: |
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        "$HOME/.local/bin/just" --version

    - name: Cache LLVM toolchain
      uses: actions/cache@v5
      with:
        path: .llvm/22.1.3
        key: llvm-22.1.3-${{ runner.os }}-${{ runner.arch }}

    - name: Install LLVM
      shell: bash
      run: just install-llvm
