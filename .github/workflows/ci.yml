name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: metallc/go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "25"

      - name: Install just
        env:
          JUST_VERSION: "1.49.0"
          JUST_SHA256: "05eb2f068b641b06e5b318796c2e27d4dcca608e65b34329a08c1b9f582611bd"
        run: |
          set -euo pipefail
          url="https://github.com/casey/just/releases/download/${JUST_VERSION}/just-${JUST_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          curl -fL "$url" -o just.tar.gz
          echo "${JUST_SHA256}  just.tar.gz" | sha256sum -c -
          mkdir -p "$HOME/.local/bin"
          tar -xzf just.tar.gz -C "$HOME/.local/bin" just
          rm just.tar.gz
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/just" --version

      - name: Cache LLVM toolchain
        uses: actions/cache@v4
        with:
          path: .llvm/22.1.3
          key: llvm-22.1.3-${{ runner.os }}-${{ runner.arch }}

      - name: Install LLVM
        run: just install-llvm

      - name: just go-mod
        run: just go-mod

      - name: Verify go.mod / go.sum clean
        run: git diff --exit-code

      - name: just fmt
        run: just fmt

      - name: Verify fmt clean
        run: git diff --exit-code

      - name: just lint
        run: just lint

      - name: just examples
        run: just examples

      - name: just examples wasm32
        run: just examples wasm32

      - name: just examples wasm64
        run: just examples wasm64

  test:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        suite: [test-go]
        opt: [none, safe, fast]
        target: [native, wasm32, wasm64]
        include:
          # test-lib on wasm hits unresolved libc imports; keep it native-only.
          - { suite: test-lib, opt: none, target: native }
          - { suite: test-lib, opt: safe, target: native }
          - { suite: test-lib, opt: fast, target: native }
    name: test (${{ matrix.suite }} ${{ matrix.opt }} ${{ matrix.target }})
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: metallc/go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "25"

      - name: Install just
        env:
          JUST_VERSION: "1.49.0"
          JUST_SHA256: "05eb2f068b641b06e5b318796c2e27d4dcca608e65b34329a08c1b9f582611bd"
        run: |
          set -euo pipefail
          url="https://github.com/casey/just/releases/download/${JUST_VERSION}/just-${JUST_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          curl -fL "$url" -o just.tar.gz
          echo "${JUST_SHA256}  just.tar.gz" | sha256sum -c -
          mkdir -p "$HOME/.local/bin"
          tar -xzf just.tar.gz -C "$HOME/.local/bin" just
          rm just.tar.gz
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/just" --version

      - name: Cache LLVM toolchain
        uses: actions/cache@v4
        with:
          path: .llvm/22.1.3
          key: llvm-22.1.3-${{ runner.os }}-${{ runner.arch }}

      - name: Install LLVM
        run: just install-llvm

      - name: just ${{ matrix.suite }} ${{ matrix.opt }} ${{ matrix.target }}
        run: just ${{ matrix.suite }} ${{ matrix.opt }} ${{ matrix.target }}
